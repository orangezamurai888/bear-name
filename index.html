<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hunter Game v0.1</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #222;
}

canvas {
    display: block;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

const world = {
    width: 3000,
    height: 3000
};

const player = {
    x: 1500,
    y: 1500,
    speed: 4
};

const camera = {
    x: 0,
    y: 0
};

const keys = {};

window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

function updatePlayer() {

    if (keys["w"]) player.y -= player.speed;
    if (keys["s"]) player.y += player.speed;
    if (keys["a"]) player.x -= player.speed;
    if (keys["d"]) player.x += player.speed;

    player.x = Math.max(0, Math.min(world.width, player.x));
    player.y = Math.max(0, Math.min(world.height, player.y));

    camera.x = player.x - canvas.width / 2;
    camera.y = player.y - canvas.height / 2;

    camera.x = Math.max(0, Math.min(world.width - canvas.width, camera.x));
    camera.y = Math.max(0, Math.min(world.height - canvas.height, camera.y));
}

function drawWorld() {

    ctx.fillStyle = "#66bb66";
    ctx.fillRect(-camera.x, -camera.y, world.width, world.height);

    // 草
    ctx.fillStyle = "#55aa55";

    for(let x=0; x<world.width; x+=100){
        for(let y=0; y<world.height; y+=100){

            ctx.beginPath();
            ctx.arc(
                x - camera.x,
                y - camera.y,
                3,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }
    }
}

function drawPlayer() {

    let screenX = player.x - camera.x;
    let screenY = player.y - camera.y;

    // 頭
    ctx.fillStyle = "#ffcc99";
    ctx.beginPath();
    ctx.arc(screenX, screenY - 15, 10, 0, Math.PI*2);
    ctx.fill();

    // 体
    ctx.fillStyle = "#3366cc";
    ctx.fillRect(screenX - 8, screenY - 5, 16, 25);

    // 足
    ctx.strokeStyle = "black";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(screenX - 5, screenY + 20);
    ctx.lineTo(screenX - 8, screenY + 35);

    ctx.moveTo(screenX + 5, screenY + 20);
    ctx.lineTo(screenX + 8, screenY + 35);
    ctx.stroke();
}

function gameLoop() {

    updatePlayer();

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawWorld();
    drawPlayer();

    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
