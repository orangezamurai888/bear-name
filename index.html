<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Hunter Game - Enhanced</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        touch-action: none;
        background: #000;
        font-family: 'Arial', sans-serif;
    }
    canvas {
        display: block;
        background: #66bb66;
    }
    #ui {
        position: fixed;
        top: 10px;
        left: 10px;
        color: white;
        font-size: 22px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        z-index: 100;
        pointer-events: none;
    }
    #healthBar {
        position: fixed;
        top: 50px;
        left: 10px;
        width: 200px;
        height: 20px;
        background: #333;
        border: 2px solid white;
        border-radius: 10px;
        overflow: hidden;
        z-index: 100;
    }
    #health {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #ff4444, #ffaa00);
        transition: width 0.3s;
    }
    #joystickBase {
        position: fixed;
        left: 20px;
        bottom: 40px;
        width: 130px;
        height: 130px;
        border-radius: 65px;
        background: rgba(255,255,255,0.2);
        border: 3px solid rgba(255,255,255,0.4);
        z-index: 100;
    }
    #joystickStick {
        position: absolute;
        left: 40px;
        top: 40px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: rgba(255,255,255,0.9);
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        transition: transform 0.05s;
    }
    #shootBtn {
        position: fixed;
        right: 30px;
        bottom: 60px;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(255, 60, 60, 0.85);
        border: 4px solid white;
        color: white;
        font-size: 18px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        z-index: 100;
        user-select: none;
    }
    #minimap {
        position: fixed;
        right: 20px;
        top: 20px;
        width: 140px;
        height: 140px;
        border: 3px solid rgba(255,255,255,0.6);
        border-radius: 8px;
        background: rgba(0,0,0,0.4);
        z-index: 100;
        overflow: hidden;
    }
</style>
</head>
<body>

<div id="ui">
    💰<span id="money">0</span>　🍖<span id="meat">0</span>　🏆<span id="score">0</span>
</div>

<div id="healthBar"><div id="health"></div></div>

<div id="joystickBase">
    <div id="joystickStick"></div>
</div>

<div id="shootBtn">🔫<br>SHOOT</div>

<div id="minimap"></div>

<canvas id="game"></canvas>

<script>
// ============== Hunter Game - Enhanced Edition ==============
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const world = { width: 4000, height: 4000 };

const player = {
    x: 2000,
    y: 2000,
    speed: 5.5,
    size: 18,
    health: 100,
    money: 0,
    meat: 0,
    score: 0,
    angle: 0
};

const camera = { x: 0, y: 0 };

let moveX = 0, moveY = 0;
let shooting = false;
let lastShot = 0;

// Joystick
const base = document.getElementById("joystickBase");
const stick = document.getElementById("joystickStick");

base.addEventListener("touchmove", (e) => {
    const touch = e.touches[0];
    const rect = base.getBoundingClientRect();
    let dx = touch.clientX - (rect.left + 65);
    let dy = touch.clientY - (rect.top + 65);
    const dist = Math.sqrt(dx*dx + dy*dy);
    const max = 55;

    if (dist > max) {
        dx = dx / dist * max;
        dy = dy / dist * max;
    }

    stick.style.left = (65 + dx - 25) + "px";
    stick.style.top = (65 + dy - 25) + "px";

    moveX = dx / max;
    moveY = dy / max;
    e.preventDefault();
}, { passive: false });

base.addEventListener("touchend", () => {
    moveX = moveY = 0;
    stick.style.left = "40px";
    stick.style.top = "40px";
});

// Shoot button
const shootBtn = document.getElementById("shootBtn");
shootBtn.addEventListener("touchstart", (e) => {
    shooting = true;
    e.preventDefault();
});
shootBtn.addEventListener("touchend", () => { shooting = false; });

// Keyboard support (for PC testing)
window.addEventListener("keydown", e => {
    if (e.key === " " || e.key === "Enter") shooting = true;
});
window.addEventListener("keyup", e => {
    if (e.key === " " || e.key === "Enter") shooting = false;
});

// Game objects
let animals = [];
let trees = [];
let projectiles = [];
let particles = [];

// Generate world
function generateWorld() {
    trees = [];
    for (let i = 0; i < 180; i++) {
        trees.push({
            x: Math.random() * world.width,
            y: Math.random() * world.height,
            size: 25 + Math.random() * 18
        });
    }
    
    animals = [];
    for (let i = 0; i < 25; i++) {
        animals.push({
            x: Math.random() * world.width,
            y: Math.random() * world.height,
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2,
            size: 14,
            type: Math.random() > 0.6 ? "deer" : "rabbit",
            health: 3,
            angle: Math.random() * Math.PI * 2
        });
    }
}

// Particles
function createParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 25 + Math.random() * 20,
            color
        });
    }
}

// Collision helper
function checkCollision(a, b) {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    return Math.sqrt(dx*dx + dy*dy) < (a.size || 20) + (b.size || 20);
}

function update() {
    // Player movement
    let dx = moveX * player.speed;
    let dy = moveY * player.speed;
    
    player.x += dx;
    player.y += dy;
    
    player.x = Math.max(50, Math.min(world.width - 50, player.x));
    player.y = Math.max(50, Math.min(world.height - 50, player.y));

    // Update angle (face movement or mouse, but for mobile we use movement direction)
    if (moveX !== 0 || moveY !== 0) {
        player.angle = Math.atan2(moveY, moveX);
    }

    // Camera
    camera.x = player.x - canvas.width / 2;
    camera.y = player.y - canvas.height / 2;

    // Shooting
    if (shooting && Date.now() - lastShot > 280) {
        projectiles.push({
            x: player.x,
            y: player.y - 10,
            vx: Math.cos(player.angle) * 18,
            vy: Math.sin(player.angle) * 18,
            life: 35
        });
        lastShot = Date.now();
        createParticles(player.x + Math.cos(player.angle)*25, player.y - 10 + Math.sin(player.angle)*25, 8, "#ffdd88");
    }

    // Update projectiles
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) projectiles.splice(i, 1);
    }

    // Update animals
    for (let animal of animals) {
        animal.x += animal.vx;
        animal.y += animal.vy;
        animal.angle = Math.atan2(animal.vy, animal.vx);

        // Bounce off walls
        if (animal.x < 30 || animal.x > world.width - 30) animal.vx *= -1;
        if (animal.y < 30 || animal.y > world.height - 30) animal.vy *= -1;

        // Random direction change
        if (Math.random() < 0.015) {
            animal.vx = (Math.random() - 0.5) * 3.2;
            animal.vy = (Math.random() - 0.5) * 3.2;
        }

        // Avoid trees
        for (let tree of trees) {
            if (checkCollision(animal, {x: tree.x, y: tree.y, size: tree.size})) {
                animal.vx *= -1.2;
                animal.vy *= -1.2;
            }
        }
    }

    // Collision: projectile vs animal
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        for (let j = animals.length - 1; j >= 0; j--) {
            const a = animals[j];
            if (checkCollision(p, a)) {
                a.health--;
                createParticles(p.x, p.y, 12, "#ff4444");
                projectiles.splice(i, 1);
                
                if (a.health <= 0) {
                    player.score += a.type === "deer" ? 80 : 35;
                    player.meat += a.type === "deer" ? 3 : 1;
                    if (Math.random() > 0.6) player.money += 25;
                    createParticles(a.x, a.y, 25, "#dd9966");
                    animals.splice(j, 1);
                    
                    // Respawn new animal
                    if (animals.length < 18) {
                        animals.push({
                            x: Math.random() * world.width,
                            y: Math.random() * world.height,
                            vx: (Math.random() - 0.5) * 2.5,
                            vy: (Math.random() - 0.5) * 2.5,
                            size: 14,
                            type: Math.random() > 0.6 ? "deer" : "rabbit",
                            health: 3,
                            angle: Math.random() * Math.PI * 2
                        });
                    }
                }
                break;
            }
        }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        p.vx *= 0.96;
        p.vy *= 0.96;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Player health regen (slow)
    if (player.health < 100 && Math.random() < 0.02) player.health += 0.3;
}

// Drawing
function drawBackground() {
    ctx.fillStyle = "#5ba85b";
    ctx.fillRect(-camera.x, -camera.y, world.width, world.height);
    
    // Grass details
    ctx.fillStyle = "#4a9a4a";
    for (let i = 0; i < 800; i += 80) {
        for (let j = 0; j < 800; j += 80) {
            const wx = (i + (Math.sin(j) * 30)) - camera.x % 120;
            const wy = (j + (Math.cos(i) * 20)) - camera.y % 120;
            ctx.fillRect(wx, wy, 6, 6);
        }
    }
}

function drawTrees() {
    for (let tree of trees) {
        const sx = tree.x - camera.x;
        const sy = tree.y - camera.y;
        
        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath();
        ctx.ellipse(sx + 8, sy + 22, tree.size * 0.9, 12, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Trunk
        ctx.fillStyle = "#8B5A2B";
        ctx.fillRect(sx - 8, sy + 5, 16, 35);
        
        // Leaves
        ctx.fillStyle = "#2e8b2e";
        ctx.beginPath();
        ctx.arc(sx, sy - 8, tree.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sx - 14, sy + 4, tree.size * 0.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sx + 14, sy + 2, tree.size * 0.85, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawAnimal(animal) {
    const sx = animal.x - camera.x;
    const sy = animal.y - camera.y;
    
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(animal.angle);
    
    if (animal.type === "deer") {
        // Deer body
        ctx.fillStyle = "#8B5A2B";
        ctx.fillRect(-18, -9, 32, 18);
        // Head
        ctx.fillStyle = "#A67C5D";
        ctx.fillRect(12, -11, 14, 12);
        // Antlers
        ctx.strokeStyle = "#ddd";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(18, -14);
        ctx.lineTo(24, -22);
        ctx.moveTo(18, -8);
        ctx.lineTo(25, -13);
        ctx.stroke();
    } else {
        // Rabbit
        ctx.fillStyle = "#c4a484";
        ctx.beginPath();
        ctx.ellipse(0, 0, 14, 11, 0, 0, Math.PI * 2);
        ctx.fill();
        // Ears
        ctx.fillStyle = "#e8c8a0";
        ctx.beginPath();
        ctx.ellipse(-6, -11, 5, 13, -0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(6, -11, 5, 13, 0.6, 0, Math.PI * 2);
        ctx.fill();
    }
    
    ctx.restore();
}

function drawPlayer() {
    const px = player.x - camera.x;
    const py = player.y - camera.y;
    
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(player.angle);
    
    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.beginPath();
    ctx.ellipse(4, 22, 16, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Legs
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(-7, 8);
    ctx.lineTo(-9, 26);
    ctx.moveTo(7, 8);
    ctx.lineTo(9, 26);
    ctx.stroke();
    
    // Body
    ctx.fillStyle = "#224488";
    ctx.fillRect(-12, -12, 24, 28);
    
    // Arms
    ctx.strokeStyle = "#ffcc99";
    ctx.lineWidth = 7;
    ctx.beginPath();
    ctx.moveTo(10, -4);
    ctx.lineTo(22, 6);
    ctx.stroke();
    
    // Head
    ctx.fillStyle = "#ffcc99";
    ctx.beginPath();
    ctx.arc(0, -18, 11, 0, Math.PI * 2);
    ctx.fill();
    
    // Hat
    ctx.fillStyle = "#112233";
    ctx.fillRect(-13, -27, 26, 9);
    
    // Gun
    ctx.fillStyle = "#555";
    ctx.fillRect(14, -6, 26, 6);
    ctx.fillStyle = "#333";
    ctx.fillRect(34, -4, 8, 3);
    
    ctx.restore();
}

function drawProjectiles() {
    ctx.fillStyle = "#ffee99";
    for (let p of projectiles) {
        const sx = p.x - camera.x;
        const sy = p.y - camera.y;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(Math.atan2(p.vy, p.vx));
        ctx.fillRect(-12, -2.5, 22, 5);
        ctx.restore();
    }
}

function drawParticles() {
    for (let p of particles) {
        const alpha = p.life / 40;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = alpha;
        ctx.fillRect(p.x - camera.x, p.y - camera.y, 5, 5);
    }
    ctx.globalAlpha = 1;
}

function drawMinimap() {
    const mm = document.getElementById("minimap");
    const mctx = mm.getContext ? mm.getContext("2d") : null;
    if (!mctx) return;
    
    mm.width = 140;
    mm.height = 140;
    
    mctx.fillStyle = "#3a7a3a";
    mctx.fillRect(0, 0, 140, 140);
    
    // Trees on minimap
    mctx.fillStyle = "#1e5a1e";
    for (let tree of trees) {
        const mx = (tree.x / world.width) * 140;
        const my = (tree.y / world.height) * 140;
        mctx.fillRect(mx - 1, my - 1, 3, 3);
    }
    
    // Animals
    mctx.fillStyle = "#c66";
    for (let a of animals) {
        const mx = (a.x / world.width) * 140;
        const my = (a.y / world.height) * 140;
        mctx.fillRect(mx - 1.5, my - 1.5, 3, 3);
    }
    
    // Player
    mctx.fillStyle = "#ff0";
    const px = (player.x / world.width) * 140;
    const py = (player.y / world.height) * 140;
    mctx.fillRect(px - 3, py - 3, 6, 6);
}

function gameLoop() {
    update();
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    drawBackground();
    drawTrees();
    
    // Draw animals
    for (let animal of animals) {
        drawAnimal(animal);
    }
    
    drawProjectiles();
    drawPlayer();
    drawParticles();
    
    drawMinimap();
    
    // UI updates
    document.getElementById("money").textContent = player.money;
    document.getElementById("meat").textContent = player.meat;
    document.getElementById("score").textContent = player.score;
    document.getElementById("health").style.width = player.health + "%";
    
    requestAnimationFrame(gameLoop);
}

// Start the game
generateWorld();
gameLoop();
</script>
</body>
</html>
